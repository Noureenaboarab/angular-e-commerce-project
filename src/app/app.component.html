<nav class="navbar">
  <a class="brand" routerLink="/">🛍️ ShopAngular</a>
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Products</a>
    <a routerLink="/cart" routerLinkActive="active" class="cart-link">
      🛒 Cart
      @if (cartService.totalCount() > 0) {
        <span class="badge">{{ cartService.totalCount() }}</span>
      }
    </a>
  </div>
</nav>

<main class="container">
  <router-outlet />
</main>
