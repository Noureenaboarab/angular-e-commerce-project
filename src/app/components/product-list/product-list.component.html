<div class="page-header">
  <h2>Our Products</h2>
  @if (!loading() && !error()) {
    <span class="subtitle">{{ products().length }} items</span>
  }
</div>

<!-- Loading -->
@if (loading()) {
  <div class="state-box">
    <div class="spinner"></div>
    <p>Loading products…</p>
  </div>
}

<!-- Error -->
@if (error()) {
  <div class="state-box error">
    <p>⚠️ {{ error() }}</p>
    <button (click)="productService.loadProducts()">Retry</button>
  </div>
}

<!-- Grid — passes data DOWN via signal inputs, listens to signal outputs -->
@if (!loading() && !error()) {
  <div class="grid">
    @for (product of products(); track product.id) {
      <app-product-card
        [product]="product"
        [inCart]="cartService.isInCart(product.id)"
        [cartCount]="cartService.quantityOf(product.id)"
        (addToCart)="onAdd($event)"
        (viewDetails)="onView($event)"
      />
    }
  </div>
}
